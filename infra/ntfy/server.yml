# ntfy server configuration
# Non-secret settings committed here. Secrets injected via Cloud Run env vars:
#   NTFY_BASE_URL        - Cloud Run service URL (update after first deploy)
#   NTFY_DATABASE_URL    - PostgreSQL connection string (ntfy-database-url secret)

listen-http: ":8080"
behind-proxy: true
proxy-forwarded-header: "X-Forwarded-For"

# Access control — personal use, no public signup
auth-default-access: "deny-all"
enable-login: true
enable-signup: false

# Message cache
cache-duration: "12h"

# Required for iOS background push — relays push signal (not content) through ntfy.sh → APNs
# base-url is injected via NTFY_BASE_URL env var in Cloud Run
upstream-base-url: "https://ntfy.sh"
